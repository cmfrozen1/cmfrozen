  const categories = [...new Set(products.map((item) => item))];
  let i = 0;


function formatPrice(price) {
    return new Intl.NumberFormat('th-TH').format(price) + ' บาท';
}

document.getElementById('root').innerHTML = categories.map((item) => {
    var { image, title, price } = item;
    var formattedPrice = formatPrice(price);
    return (
        `<div class='box'>
            <div class='img-box'>
                <img class='images' src=${image}></img>
            </div>
            <div class='bottom'>
                <p>${title}</p>
                <h2> ${formattedPrice}</h2>` +
                "<button onclick='addtocart(" + (i++) + ")'>Add to cart</button>" +
            `</div>
        </div>`
    );
}).join('');



  var cart = [];


function addtocart(a){
    cart.push({...categories[a]});
    displaycart();
}
function delElement(a){
    cart.splice(a, 1);
    displaycart();
}


function displaycart() {
    let j = 0, total = 0;
    document.getElementById("count").innerHTML = cart.length;

    var checkoutSection = document.getElementById('checkOut');

    if (cart.length == 0) {
        document.getElementById('cartItem').innerHTML = "Your cart is empty";
        document.getElementById("total").innerHTML = "0.00 บาท";
        document.getElementById("paymentSection").style.display = 'none';
    } else {
        document.getElementById("paymentSection").style.display = 'block';
        document.getElementById("cartItem").innerHTML = cart.map((items) => {
            var { image, title, price } = items;
            total += price;
            var formattedPrice = formatPrice(price);
            return (
                `<div class='cart-item'>
                    <div class='row-img'>
                        <img class='rowimg' src=${image}>
                    </div>
                    <p style='font-size:12px;'>${title}</p>
                    <h2 style='font-size: 15px;'>${formattedPrice}</h2>` +
                    "<i class='fa-solid fa-trash' onclick='delElement(" + (j++) + ")'></i></div>"
            );
        }).join('');

        // Format the total price
        var formattedTotal = formatPrice(total);
        document.getElementById("total").innerHTML = formattedTotal;



        
        checkoutSection.style.display = 'block';

const qrCodeImage = document.getElementById("myQR");
qrCodeImage.src = "https://promptpay.io/0836712486/" + total + ".png";

    }
}



function checkout() {
  var customerName = document.getElementById('customerName').value.trim();
  var customerAddress = document.getElementById('customerAddress').value.trim();

  if (cart.length === 0) {
    Swal.fire({
      title: 'ยังไม่ได้เลือกซื้อสินค้า',
      text: 'กรุณาเลือกซื้อสินค้า ก่อนทำการจ่ายเงิน',
      icon: 'error',
      confirmButtonText: 'OK'
    });
    return;
  }

  if (customerName === '' || customerAddress === '') {
    Swal.fire({
      title: 'ข้อมูลไม่ครบถ้วน',
      text: 'กรุณากรอกชื่อ และที่อยู่เพื่อทำการจัดส่งด้วยครับ',
      icon: 'warning',
      confirmButtonText: 'OK'
    });
    return;
  }

  var orderData = {
    items: cart,
    customerName: customerName,
    customerAddress: customerAddress
  };

  google.script.run.withSuccessHandler(function() {
    Swal.fire({
      title: 'Success',
      text: 'Order placed successfully!',
      icon: 'success',
      confirmButtonText: 'OK'
    });

    cart = [];
    document.getElementById('customerName').value = '';
    document.getElementById('customerAddress').value = '';
    displaycart();

  }).saveOrder(orderData);
}</script></body></html>
