<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App in JavaScript | CodingNepal</title>
    <link rel="stylesheet" href="style.css" >
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://unpkg.com/boxicons@2.0.9/css/boxicons.min.css" rel='stylesheet'>

<body>
  <div class="wrapper">
      <header><i class="bx bx-left-arrow-alt"></i>Weather App</header>
      <section class="input-part">
        <p class="info-text">Please enter a valid city name</p>
        <input type="text" placeholder="Enter city name" spellcheck="false" required>
        <div class="separator"></div>
        <button>Get Device Location</button>
      </section>    
      <section class="weather-part">
        <img src="icons/cloud.svg" alt="Weather Icon"> 
        <div class="temp">
        <span class="numb">13</span>
        <span class="deg"> ํ</span>C
        </div>
      </section>
      <div class="weathe">Broken Clouds</div>
      <i class="bx bx-map"></i>
      <span>Kathmandu, Nepal</span>
  </div>
  <div class="bottom-details">
    <div class="colum humidity">
    <i class="bx bxs-thermometer"></i>
    <div class="details">
        <div class="temp">
    <span class="numb">17</span>
    <span class="deg">ํ</span>C  
    </div>
    <p>Feels like </p>
    </div>
  </div>
</div>
</section>
  </div>

</body>
</html>
